<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogo das Escolhas</title>

<style>
:root{
  --indigo:#1f2a44;
  --pinhao:#6b3d2e;
  --pinhao-hover:#8a4d39;
  --card:rgba(20,27,48,0.96);
  --texto:#eef1f7;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(rgba(10,15,30,.85),rgba(10,15,30,.85)), url('foto.jpg') center/cover no-repeat fixed;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--texto);
}

.ui{
  width:95%;
  max-width:1050px;
  background:var(--card);
  border-radius:20px;
  padding:40px;
  box-shadow:0 0 80px rgba(0,0,0,.7);
  display:flex;
  flex-direction:column;
  gap:26px;
  backdrop-filter:blur(8px);
}

h1{font-weight:600}
.sub{opacity:.7;font-size:14px}
#texto{font-size:20px;line-height:1.6}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.center{display:flex;justify-content:center;margin-top:18px}

button{
  background:var(--pinhao);
  border:none;
  padding:14px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:.2s;
  font-size:15px;
  width:100%;
}

button:hover{
  transform:translateY(-2px);
  background:var(--pinhao-hover);
}

.secondary{
  background: var(--indigo);
  border:1px solid rgba(255,255,255,0.15);
}
.secondary:hover{
  background:#2d3a63;
}

.area{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
}

.lista{
  background:#2a355a;
  border-radius:12px;
  padding:18px;
  font-size:14px;
  min-height:240px;
}

.input-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:14px;
}

input{
  width:60%;
  padding:12px;
  border-radius:8px;
  border:none;
}

.footer{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:22px;
}

/* RESPONSIVO PERFEITO */
@media (max-width:768px){
  .ui{padding:22px;height:95vh;overflow:auto}
  .grid,.area{grid-template-columns:1fr}
  input{width:100%}
  .input-row{flex-direction:column}
  .footer{flex-direction:column}
  #texto{font-size:18px}
}
</style>
</head>

<body>

<audio id="musica" src="musica.mp3" loop></audio>

<div class="ui">
  <h1>Jogo das Escolhas</h1>
  <div class="sub">Missão para a Beatriz • com a Laísa</div>
  <div id="texto"></div>
  <div id="conteudo"></div>
</div>

<script>
const musica=document.getElementById("musica");

let historico=[];
let selecao=[];

function render(txt,node,footer=false){
  texto.innerHTML=txt;
  conteudo.innerHTML="";
  conteudo.appendChild(node);

  if(footer){
    const f=document.createElement("div");
    f.className="footer";

    const back=document.createElement("button");
    back.innerText="voltar";
    back.className="secondary";
    back.onclick=()=>historico.pop()();

    const concluir=document.createElement("button");
    concluir.innerText="concluir escolhas";
    concluir.onclick=finalizar;

    f.append(back,concluir);
    conteudo.appendChild(f);
  }
}

function inicio(){
  historico=[];
  const b=document.createElement("button");
  b.innerText="iniciar";

  b.onclick=()=>{
    musica.play(); // começa a música no clique real
    modos();
  };

  render(`Bem-vinda ao jogo do planejamento.<br><br>Primeira missão: <b>selecione o seu modo</b>.`,b);
}

function modos(){
  historico.push(inicio);

  const wrap=document.createElement("div");
  const grid=document.createElement("div");
  grid.className="grid";

  ["modo dengo","modo saidinha"].forEach((t,i)=>{
    const b=document.createElement("button");
    b.innerText=t;
    b.onclick=i?saida:dengo;
    grid.appendChild(b);
  });

  const ambos=document.createElement("button");
  ambos.innerText="ambos";
  ambos.style.width="50%";
  ambos.onclick=ambosModo;

  const c=document.createElement("div");
  c.className="center";
  c.appendChild(ambos);

  wrap.append(grid,c);
  render("Selecione o seu modo:",wrap);
}

function montar(titulo,op){
  selecao=[];
  historico.push(modos);

  const area=document.createElement("div");
  area.className="area";

  const grid=document.createElement("div");
  grid.className="grid";

  const box=document.createElement("div");
  box.className="lista";

  function att(){
    box.innerHTML="<b>ordem escolhida:</b><br><br>"+
    (selecao.length?selecao.map((s,i)=>`${i+1}. ${s}`).join("<br>"):"nenhuma ainda.");
  }

  op.forEach(o=>{
    const b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>{selecao.push(o);att();}
    grid.appendChild(b);
  });

  const row=document.createElement("div");
  row.className="input-row";

  const inp=document.createElement("input");
  inp.placeholder="digite outra opção";

  const add=document.createElement("button");
  add.innerText="adicionar";
  add.onclick=()=>{if(inp.value){selecao.push(inp.value);inp.value="";att();}}

  row.append(inp,add);
  area.append(grid,box);

  const wrap=document.createElement("div");
  wrap.append(area,row);

  att();
  render(titulo,wrap,true);
}

function dengo(){
  montar("dengo detectado. defina a rota.",[
    "filminho / série e carinho",
    "autocuidados",
    "massagem",
    "preparar jantar"
  ]);
}

function saida(){
  montar("energia detectada. defina a rota.",[
    "sair para comer",
    "boliche",
    "parque",
    "barzinho"
  ]);
}

function ambosModo(){
  montar("monte a quarta-feira completa.",[
    "filminho / série e carinho",
    "autocuidados",
    "massagem",
    "preparar jantar",
    "sair para comer",
    "boliche",
    "parque",
    "barzinho"
  ]);
}

function finalizar(){
  const box=document.createElement("div");
  box.className="lista";

  box.innerHTML="<b>escolhas de quarta-feira selecionadas:</b><br><br>"+
  selecao.map((s,i)=>`${i+1}. ${s}`).join("<br>");

  const f=document.createElement("div");
  f.className="footer";

  const voltar=document.createElement("button");
  voltar.innerText="voltar e alterar";
  voltar.className="secondary";
  voltar.onclick=()=>historico.pop()();

  const zap=document.createElement("button");
  zap.innerText="enviar no whatsapp";
  zap.onclick=enviarWhats;

  f.append(voltar,zap);
  box.appendChild(f);

  render("planejamento definido.",box);
}

function enviarWhats(){
  const numero="5511944441812";
  let msg="rota de quarta-feira:\n\n";
  selecao.forEach((s,i)=>msg+=`${i+1}. ${s}\n`);
  msg+="\namo voce, meu bem.";
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

inicio();
</script>
</body>
</html>
